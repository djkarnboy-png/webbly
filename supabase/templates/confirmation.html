<!doctype html>
<html lang="en">
  <body style="margin:0;background:#f6f7fb;font-family:Arial,sans-serif;color:#0f172a;">
    <div style="max-width:560px;margin:0 auto;padding:40px 20px;">
      <div style="background:#ffffff;border:1px solid #e2e8f0;border-radius:8px;padding:32px;">
        <p style="margin:0 0 12px;color:#1d4ed8;font-size:13px;font-weight:700;text-transform:uppercase;">
          Welcome to Webbly
        </p>
        <h1 style="margin:0;font-size:28px;line-height:1.25;">Activate your account</h1>
        <p style="margin:16px 0 24px;color:#475569;font-size:16px;line-height:1.6;">
          Confirm your email address to activate your Webbly account and continue browsing or publishing website templates.
        </p>
        <p style="margin:0 0 24px;">
          <a
            href="{{ .RedirectTo }}/auth/confirm?token_hash={{ .TokenHash }}&type=email"
            style="display:inline-block;background:#2563eb;color:#ffffff;text-decoration:none;font-weight:700;padding:14px 22px;border-radius:8px;"
          >
            Verify email address
          </a>
        </p>
        <p style="margin:0;color:#64748b;font-size:13px;line-height:1.6;">
          If you did not create a Webbly account, you can safely ignore this email.
        </p>
      </div>
    </div>
  </body>
</html>
